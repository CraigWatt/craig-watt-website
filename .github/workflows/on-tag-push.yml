concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Deploy Static Website

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.BOOTSTRAP_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Write website env
        run: |
          cat > services/website/.env.production <<EOF
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          EOF

      - name: Lint website
        run: npx nx run website:lint

      - name: Test website
        run: npx nx run website:test

      - name: Build static website
        run: npx nx run website:build

      - name: Build Lambda handlers
        run: npm run build:functions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init --reconfigure \
            -backend-config="bucket=craig-watt-tfstate" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -input=false \
            -lock-timeout=5m \
            -var="domain=craigwatt.co.uk" \
            -var="mailersend_api_key=${{ secrets.MAILERSEND_API_KEY }}" \
            -var="recaptcha_secret_key=${{ secrets.RECAPTCHA_SECRET_KEY }}" \
            -var="t212_api_key=${{ secrets.T212_API_KEY }}" \
            -var="t212_api_secret=${{ secrets.T212_API_SECRET }}" \
            -var="contact_email_to=${{ secrets.CONTACT_EMAIL_TO }}" \
            -var="contact_email_from=${{ secrets.CONTACT_EMAIL_FROM }}"
