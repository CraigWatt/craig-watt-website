concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: eu-west-2
  NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ci-placeholder

jobs:
  verify:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: services/website/.next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('package-lock.json', 'services/website/app/**/*', 'services/website/content/**/*', 'services/website/public/**/*', 'services/website/.storybook/**/*') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Write website env
        run: |
          cat > services/website/.env.production <<EOF
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
          EOF

      - name: Lint website
        run: npm run lint

      - name: Test website
        run: npm run test

      - name: Build Lambda handlers
        run: npm run build:functions

      - name: Build static website
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run e2e -- --project chromium
